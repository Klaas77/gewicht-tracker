<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewicht tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammerjs/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 24px 16px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 20px; }
  .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 20px; margin-bottom: 16px; }
  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .metric { background: #f9f9f9; border-radius: 8px; padding: 12px 16px; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 500; }
  .metric-unit { font-size: 13px; color: #888; margin-left: 3px; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .input-group { flex: 1; min-width: 120px; }
  .input-group label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
  input[type="date"], input[type="number"] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
  input:focus { border-color: #2E6DA4; }
  button { padding: 8px 18px; background: #2E6DA4; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
  button:hover { background: #245a8a; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
  .btn-edit { background: #f0f0f0; color: #333; }
  .btn-edit:hover { background: #e0e0e0; }
  .btn-del { background: #fdecea; color: #c0392b; }
  .btn-del:hover { background: #f5c6c2; }
  .btn-cancel { background: #f0f0f0; color: #333; }
  .btn-cancel:hover { background: #e0e0e0; }
  .btn-save-edit { background: #1a7a4a; color: white; }
  .btn-save-edit:hover { background: #155f39; }
  .status { font-size: 13px; margin-top: 10px; min-height: 20px; }
  .status.ok { color: #1a7a4a; }
  .status.err { color: #c0392b; }
  .status.loading { color: #888; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: #888; font-weight: 500; padding: 7px 8px; border-bottom: 1px solid #eee; font-size: 13px; }
  td { padding: 7px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.editing { background: #f0f7ff; }
  .bmi-ok { color: #1a7a4a; }
  .bmi-warn { color: #e67e22; }
  .bmi-bad { color: #c0392b; }
  .section-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  .actions { display: flex; gap: 6px; }
  input.edit-input { width: 80px; padding: 4px 8px; font-size: 13px; border-radius: 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>Gewicht tracker</h1>
  <div id="load-status" class="status loading" style="margin-bottom:12px;">Data ophalen...</div>

  <div id="main" style="display:none;">
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Huidig gewicht</div>
        <div class="metric-value" id="m-current">—<span class="metric-unit">kg</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">Huidig BMI</div>
        <div class="metric-value" id="m-bmi">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Verschil t.o.v. start</div>
        <div class="metric-value" id="m-diff">—</div>
      </div>
    </div>

    <div class="card">
      <canvas id="chart" height="160"></canvas>
    </div>

    <div class="card">
      <div class="section-title">Nieuw gewicht invoeren</div>
      <div class="input-row">
        <div class="input-group">
          <label>Datum</label>
          <input type="date" id="inp-date" />
        </div>
        <div class="input-group">
          <label>Gewicht (kg)</label>
          <input type="number" id="inp-weight" step="0.1" min="40" max="200" placeholder="79.5" />
        </div>
        <button onclick="saveWeight()" id="save-btn">Opslaan</button>
      </div>
      <div id="save-status" class="status"></div>
    </div>

    <div class="card">
      <div class="section-title">Alle metingen</div>
      <div id="table-wrap"></div>
    </div>
  </div>
</div>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycbxDxfsIM8zzY7cDiKkyKf3FD4YqEhCtHEuGZyfDaLFj0A3okACeikYzLn3FPh_yHvra/exec';
const HEIGHT_M = 1.77;
const START_WEIGHT = 93.5;
let chartInstance = null;
let allData = [];
let editingDate = null;

function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  return d + '-' + m + '-' + y;
}

function bmiClass(bmi) {
  if (bmi < 18.5) return 'bmi-warn';
  if (bmi <= 25) return 'bmi-ok';
  if (bmi <= 30) return 'bmi-warn';
  return 'bmi-bad';
}

function calcBmi(w) {
  return parseFloat((w / (HEIGHT_M * HEIGHT_M)).toFixed(1));
}

async function loadData() {
  setStatus('load-status', 'Data ophalen...', 'loading');
  try {
    const res = await fetch(WEBHOOK + '?action=read');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allData = data.rows
      .map(r => ({ date: r.date, weight: r.weight, bmi: calcBmi(r.weight) }))
      .sort((a,b) => a.date.localeCompare(b.date));
    renderAll();
    setStatus('load-status', '', '');
    document.getElementById('main').style.display = 'block';
  } catch(e) {
    setStatus('load-status', 'Fout bij ophalen: ' + e.message, 'err');
  }
}

function renderAll() {
  if (!allData.length) return;
  const last = allData[allData.length - 1];

  document.getElementById('m-current').innerHTML = last.weight.toFixed(1) + '<span class="metric-unit">kg</span>';

  const bmiEl = document.getElementById('m-bmi');
  bmiEl.innerHTML = last.bmi.toFixed(1);
  bmiEl.className = 'metric-value ' + bmiClass(last.bmi);

  const diff = +(last.weight - START_WEIGHT).toFixed(1);
  const diffEl = document.getElementById('m-diff');
  diffEl.innerHTML = (diff > 0 ? '+' : '') + diff + '<span class="metric-unit">kg</span>';
  diffEl.style.color = diff < 0 ? '#1a7a4a' : diff > 0 ? '#c0392b' : '#1a1a1a';

  renderChart();
  renderTable();

  const today = new Date().toISOString().slice(0,10);
  document.getElementById('inp-date').value = today;
}

function renderChart() {
  if (chartInstance) chartInstance.destroy();

  // Bepaal laatste 3 maanden
  const lastDate = new Date(allData[allData.length - 1].date);
  const threeMonthsAgo = new Date(lastDate);
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 6);
  const labels = allData.map(r => fmtDate(r.date));
  const minLabel = fmtDate(threeMonthsAgo.toISOString().slice(0,10));

  const ctx = document.getElementById('chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: allData.map(r => fmtDate(r.date)),
      datasets: [
        {
          label: 'Gewicht (kg)',
          data: allData.map(r => r.weight),
          borderColor: '#2E6DA4',
          backgroundColor: 'rgba(46,109,164,0.08)',
          tension: 0.3, pointRadius: 0, yAxisID: 'y'
        },
        {
          label: 'BMI',
          data: allData.map(r => r.bmi),
          borderColor: '#1D9E75',
          backgroundColor: 'transparent',
          tension: 0.3, pointRadius: 0, borderWidth: 1.5, yAxisID: 'y2'
        },
        {
          label: 'BMI 25 (grens)',
          data: allData.map(() => 25),
          borderColor: '#ED7D31',
          borderDash: [6,4], pointRadius: 0, borderWidth: 1.5, yAxisID: 'y2'
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { font: { size: 12 }, boxWidth: 20 } },
        zoom: {
          pan: { enabled: true, mode: 'x' },
          zoom: { pinch: { enabled: true }, wheel: { enabled: false }, mode: 'x' },
          limits: { x: { minRange: 4 } }
        }
      },
      scales: {
        x: {
          min: minLabel,
          max: labels[labels.length - 1],
          ticks: { maxTicksLimit: 6, font: { size: 11 }, maxRotation: 90, minRotation: 90 },
          grid: { display: false }
        },
        y: {
          min: 50, max: 100,
          title: { display: true, text: 'kg', font: { size: 11 } },
          ticks: { font: { size: 11 } }
        },
        y2: {
          position: 'right',
          title: { display: true, text: 'BMI', font: { size: 11 } },
          ticks: { font: { size: 11 } },
          grid: { display: false },
          min: 18, max: 35
        }
      }
    }
  });
}

function renderTable() {
  const reversed = [...allData].reverse();
  let html = `<table>
    <tr><th>Datum</th><th>Gewicht</th><th>BMI</th><th>Δ start</th><th></th></tr>`;

  for (const r of reversed) {
    const diff = +(r.weight - START_WEIGHT).toFixed(1);
    const diffStr = (diff > 0 ? '+' : '') + diff + ' kg';
    const diffColor = diff < 0 ? '#1a7a4a' : diff > 0 ? '#c0392b' : '#888';

    if (editingDate === r.date) {
      html += `<tr class="editing">
        <td>${fmtDate(r.date)}</td>
        <td><input type="number" id="edit-weight" class="edit-input" value="${r.weight}" step="0.1" min="40" max="200" /></td>
        <td>${r.bmi.toFixed(1)}</td>
        <td style="color:${diffColor}">${diffStr}</td>
        <td><div class="actions">
          <button class="btn-sm btn-save-edit" onclick="confirmEdit('${r.date}')">Opslaan</button>
          <button class="btn-sm btn-cancel" onclick="cancelEdit()">Annuleer</button>
        </div></td>
      </tr>`;
    } else {
      html += `<tr>
        <td>${fmtDate(r.date)}</td>
        <td>${r.weight.toFixed(1)} kg</td>
        <td class="${bmiClass(r.bmi)}">${r.bmi.toFixed(1)}</td>
        <td style="color:${diffColor}">${diffStr}</td>
        <td><div class="actions">
          <button class="btn-sm btn-edit" onclick="startEdit('${r.date}')">Wijzig</button>
          <button class="btn-sm btn-del" onclick="deleteEntry('${r.date}')">Verwijder</button>
        </div></td>
      </tr>`;
    }
  }
  html += '</table>';
  document.getElementById('table-wrap').innerHTML = html;

  if (editingDate) {
    const el = document.getElementById('edit-weight');
    if (el) { el.focus(); el.select(); }
  }
}

function startEdit(date) {
  editingDate = date;
  renderTable();
}

function cancelEdit() {
  editingDate = null;
  renderTable();
}

async function confirmEdit(date) {
  const weight = parseFloat(document.getElementById('edit-weight').value);
  if (isNaN(weight)) return;
  editingDate = null;
  await writeToSheet(date, weight, 'save-status');
}

async function deleteEntry(date) {
  if (!confirm('Meting van ' + fmtDate(date) + ' verwijderen?')) return;
  await writeToSheet(date, null, 'save-status', true);
}

async function saveWeight() {
  const date = document.getElementById('inp-date').value;
  const weight = parseFloat(document.getElementById('inp-weight').value);
  if (!date || isNaN(weight)) { setStatus('save-status', 'Vul datum en gewicht in.', 'err'); return; }
  setStatus('save-status', 'Opslaan...', 'loading');
  document.getElementById('save-btn').disabled = true;
  try {
    await writeToSheet(date, weight, 'save-status');
    document.getElementById('inp-weight').value = '';
  } finally {
    document.getElementById('save-btn').disabled = false;
  }
}

async function writeToSheet(date, weight, statusId, isDelete) {
  if (statusId) setStatus(statusId, 'Bezig...', 'loading');
  try {
    const body = isDelete
      ? { action: 'delete', date }
      : { action: 'write', date, weight };
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (statusId) {
      const msg = isDelete
        ? '✓ Meting van ' + fmtDate(date) + ' verwijderd'
        : '✓ Opgeslagen: ' + fmtDate(date) + ' — ' + parseFloat(weight).toFixed(1) + ' kg';
      setStatus(statusId, msg, 'ok');
    }
    await loadData();
  } catch(e) {
    if (statusId) setStatus(statusId, 'Fout: ' + e.message, 'err');
  }
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

loadData();
</script>
</body>
</html>
